<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1b2430">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Billar Online">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon.svg">
<link rel="icon" href="icons/icon.svg">
<title>Billar Online</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="lobby" class="overlay">
  <div class="panel">
    <h1>🎱 Billar Online</h1>
    <p class="sub">Bola 8 para dos jugadores</p>
    <input id="nameInput" type="text" maxlength="16" placeholder="Tu nombre" autocomplete="off">
    <button id="createBtn" class="primary">Crear mesa</button>
    <div class="joinRow">
      <input id="codeInput" type="text" maxlength="4" placeholder="CÓDIGO" autocomplete="off">
      <button id="joinBtn">Unirse</button>
    </div>
    <p id="lobbyError" class="error"></p>
  </div>
</div>

<div id="game" class="hidden">
  <header id="hud">
    <div class="player" id="p0">
      <span class="pname">—</span>
      <span class="pgroup"></span>
      <div class="tray"></div>
    </div>
    <div id="center">
      <div id="roomTag">Mesa: <b id="roomCode">—</b></div>
      <div id="status">Esperando rival…</div>
    </div>
    <div class="player" id="p1">
      <span class="pname">—</span>
      <span class="pgroup"></span>
      <div class="tray"></div>
    </div>
  </header>

  <div id="tableWrap">
    <canvas id="table" width="1092" height="592"></canvas>
    <div id="overMsg" class="hidden">
      <div id="overText"></div>
      <button id="rematchBtn" class="primary">Revancha</button>
    </div>
  </div>

  <div id="bottom">
    <div id="powerWrap"><div id="powerBar"></div></div>
    <div id="chat">
      <div id="chatLog"></div>
      <form id="chatForm">
        <input id="chatInput" type="text" maxlength="200" placeholder="Escribe un mensaje…" autocomplete="off">
        <button type="submit">Enviar</button>
      </form>
    </div>
  </div>
</div>

<script src="shared/physics.js"></script>
<script src="config.js"></script>
<script src="client.js"></script>
</body>
</html>
